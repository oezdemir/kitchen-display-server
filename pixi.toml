[workspace]
name = "xte-kitchen-server"
version = "0.1.0"
description = "Kitchen-display host service for the Xteink X4 (Hermes-driven)."
authors = ["Ugur Oezdemir <ugur@bonsairobotics.ai>"]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64"]

[dependencies]
python = "3.12.*"
pip = "*"

[pypi-dependencies]
xte-kitchen-server = { path = ".", editable = true }
fastapi = ">=0.115,<0.120"
uvicorn = { version = ">=0.32,<0.35", extras = ["standard"] }
pillow = ">=10.4,<12"
typer = ">=0.12,<0.26"
httpx = ">=0.27,<0.29"
rich = ">=13,<14"

[feature.dev.pypi-dependencies]
pytest = ">=8,<9"
pytest-asyncio = ">=0.24,<0.26"
ruff = ">=0.7,<0.10"
build = ">=1.2,<2"
tomli = ">=2"
tomli-w = ">=1.0,<2"

[environments]
default = { features = ["dev"], solve-group = "default" }

[tasks]
serve = "xte-kitchen-server"
cli = "xte-kitchen"
test = "pytest -q tests/"
lint = "ruff check src/ tests/ scripts/"
fmt = "ruff format src/ tests/ scripts/"
sync-deps = "python scripts/sync_deps.py"
build-wheel = { cmd = "python -m build --wheel", depends-on = ["sync-deps"] }
smoke-install = "bash scripts/smoke_install.sh"
